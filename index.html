<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A modern Tetris experience for the web." />
    <title>Tetris — Web Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap"
    />
  </head>
  <body>
    <div class="ambient-layer" aria-hidden="true"></div>
    <div class="page">
      <header class="site-header">
        <div class="brand">
          <span class="brand-mark">TETRIS</span>
          <span class="brand-sub">Web Edition</span>
        </div>
      </header>
      <main class="play-stage" aria-label="Tetris game">
        <div id="game"></div>
      </main>
      <footer class="site-footer">
        <ul class="controls-list" aria-label="Controls">
          <li><kbd>A</kbd><kbd>D</kbd><span>Move</span></li>
          <li><kbd>W</kbd><span>Rotate</span></li>
          <li><kbd>S</kbd><span>Soft drop</span></li>
          <li><kbd>Space</kbd><span>Hard drop</span></li>
          <li><kbd>C</kbd><span>Hold</span></li>
          <li><kbd>P</kbd><span>Pause</span></li>
          <li><kbd>M</kbd><span>Mute</span></li>
          <li><kbd>R</kbd><span>Restart</span></li>
        </ul>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
